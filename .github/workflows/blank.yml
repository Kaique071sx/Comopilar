name: Build ProxyPin SSH Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: meu_repo

      - uses: actions/checkout@v4
        with:
          repository: wanghongenpin/proxypin
          path: proxypin_oficial

      - name: Preparar arquivos
        run: |
          rm -f proxypin_oficial/lib/l10n/*pt*.arb
          cp meu_repo/app_pt-BR.arb proxypin_oficial/lib/l10n/

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Abrir Acesso SSH
        uses: mxschmitt/action-tmate@v3
        if: always()
